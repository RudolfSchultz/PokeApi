<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDex</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="shortcut icon" href="assets/pokeball.svg" type="image/x-icon">


</head>

<body onload="init()">

    <header>
        <div class="contentlimit justify-between">
            <div class="logo-container">
                <!-- <img src="./assets/pokedex.png" alt="PokeDex Logo" class="logo"> -->
                <h1>Pokedex</h1>
            </div>
            <div section class="search-container">
                <span id="pokemon-count">0</span>
                <input type="text" id="search-input" placeholder="Search Pokemon...">
            </div>
            <div class="generation-control">
                <label for="gen-options">Wähle Generation:</label>
                <select name="generation" id="gen-options"></select>
            </div>

        </div>
    </header>

    <main>
        <div class="contentlimit flex-column">
            <div id="pokedex-container" class="pokedex-container">
            </div>
        </div>
    </main>

    <footer>
        <div class="contentlimit">
            <p>&copy; 2026 Pokedex. All rights reserved.</p>
        </div>
    </footer>

    <dialog id="pokemon-view">
    </dialog>


</body>
<script src="./scripts/template.js"></script>
<script src="./scripts/main.js"></script>

<link rel="stylesheet" href="./styles/template.css">



</html>
