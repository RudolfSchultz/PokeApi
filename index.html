<body onload="init()">

                <h1>Pokedex</h1>
            </div>
            <div section class="search-container">
                <div class="count-control">
                    <label for="count-options">Wähle:</label>
                    <select name="counter" id="count-options">
                        <!-- <option value="1" data-min="1" data-max="151">1 - 151</option>
                        <option value="2" data-min="152" data-max="251">152 - 251</option>
                        <option value="3" data-min="252" data-max="386">252 - 386</option>
                        <option value="4" data-min="387" data-max="493">387 - 493</option>
                        <option value="5" data-min="494" data-max="649">494 - 649</option>
                        <option value="6" data-min="650" data-max="721">650 - 721</option>
                        <option value="7" data-min="722" data-max="809">722 - 809</option>
                        <option value="8" data-min="810" data-max="905">810 - 905</option>
                        <option value="9" data-min="906" data-max="1025">906 - 1025</option> -->
                    </select>
                </div>
                <input type="text" id="search-input" placeholder="Search Pokemon...">
            </div>
            <div class="generation-control">
                <label for="gen-options">Wähle Generation:</label>
                <select name="generation" id="gen-options"></select>
            </div>

        </div>
    </header>

    <main>
        <div class="contentlimit flex-column">
            <div id="pokedex-container" class="pokedex-container">
            </div>
        </div>
    </main>

    <footer>
        <div class="contentlimit">
            <p>&copy; 2026 Pokedex. All rights reserved.</p>
        </div>
    </footer>

    <dialog class="pokemon-details-view" id="pokemon-view">
    </dialog>


</body>
<script src="./scripts/template.js"></script>
<script src="./scripts/main.js"></script>

<link rel="stylesheet" href="./styles/template.css">

</html>
